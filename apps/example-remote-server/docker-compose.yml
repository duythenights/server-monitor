services:
  example-remote-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: example-remote-server
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - PORT=4000
      - FB_HTTP_HOST=${FB_HTTP_HOST:-host.docker.internal}
      - FB_HTTP_PORT=${FB_HTTP_PORT:-3000}
      - FB_HTTP_URI=${FB_HTTP_URI:-/log-analysis/ingest/job-123}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
