[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  Off

# ─── Tail the combined log (all levels) ──────────────────────────────────────

[INPUT]
    Name         tail
    Path         /app/logs/combined.log
    Tag          logs.combined
    Read_from_Head True
    Refresh_Interval 5
    Parser       app_log
    DB           /tmp/fb_combined.db

# ─── Tail the error-only log ─────────────────────────────────────────────────

[INPUT]
    Name         tail
    Path         /app/logs/error.log
    Tag          logs.error
    Read_from_Head True
    Refresh_Interval 5
    Parser       app_log
    DB           /tmp/fb_error.db

# ─── Filters ─────────────────────────────────────────────────────────────────

# Add hostname and app name to every record
[FILTER]
    Name         record_modifier
    Match        *
    Record       hostname ${HOSTNAME}
    Record       app example-remote-server

# Lift nested JSON from the message field (if the parser captured it as a string)
[FILTER]
    Name         grep
    Match        *
    Regex        level ^(ERROR|CRITICAL)$

# ─── Forward to HTTP endpoint ────────────────────────────────────────────────

[OUTPUT]
    Name         http
    Match        *
    Host         ${FB_HTTP_HOST}
    Port         ${FB_HTTP_PORT}
    URI          ${FB_HTTP_URI}
    Format       json
    Json_date_key timestamp
    Json_date_format iso8601
